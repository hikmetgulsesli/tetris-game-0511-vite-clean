<body class="bg-background text-on-background min-h-screen flex items-center justify-center font-body-md overflow-hidden relative">
<!-- Blurred Background Context (Simulated Game Board) -->
<div class="absolute inset-0 z-0 flex items-center justify-center opacity-30 blur-sm">
<div class="w-full max-w-2xl h-3/4 border border-outline-variant/30 relative" style="background-image: radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.1) 0%, transparent 70%);">
<!-- Simulated Grid Lines -->
<div class="absolute inset-0 bg-[linear-gradient(to_right,#334155_1px,transparent_1px),linear-gradient(to_bottom,#334155_1px,transparent_1px)] bg-[size:40px_40px] opacity-20"></div>
</div>
</div>
<!-- Full Screen Backdrop Blur for Game Over -->
<div class="fixed inset-0 backdrop-blur-[20px] bg-background/60 z-10"></div>
<!-- Main Game Over Modal/Card -->
<main class="relative z-20 w-full max-w-lg mx-auto px-md">
<div class="bg-surface-container rounded-xl border border-outline-variant/50 p-xl shadow-2xl relative overflow-hidden flex flex-col items-center">
<!-- Inner Glow Effect -->
<div class="absolute inset-0 pointer-events-none rounded-xl" style="box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.5);"></div>
<!-- Header -->
<h1 class="text-display-lg font-display-lg text-error mb-sm text-center drop-shadow-[0_0_15px_rgba(220,38,38,0.5)]">GAME OVER</h1>
<!-- Personal Best Indicator -->
<div class="bg-primary/20 text-primary border border-primary/50 px-md py-sm rounded-full flex items-center gap-sm mb-lg animate-pulse">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-label-caps font-label-caps">NEW PERSONAL BEST!</span>
</div>
<!-- Stats Bento Grid -->
<div class="w-full grid grid-cols-2 gap-md mb-xl">
<!-- Final Score (Prominent) -->
<div class="col-span-2 bg-surface p-md rounded-lg border border-outline-variant/30 flex flex-col items-center justify-center relative group">
<span class="text-label-caps font-label-caps text-on-surface-variant mb-xs">FINAL SCORE</span>
<span class="text-display-lg font-mono-stats text-primary font-bold tracking-wider">045,920</span>
</div>
<!-- Level Reached -->
<div class="bg-surface p-md rounded-lg border border-outline-variant/30 flex flex-col items-center justify-center">
<span class="text-label-caps font-label-caps text-on-surface-variant mb-xs">LEVEL</span>
<span class="text-headline-md font-mono-stats text-on-surface font-semibold">14</span>
</div>
<!-- Total Lines -->
<div class="bg-surface p-md rounded-lg border border-outline-variant/30 flex flex-col items-center justify-center">
<span class="text-label-caps font-label-caps text-on-surface-variant mb-xs">LINES</span>
<span class="text-headline-md font-mono-stats text-on-surface font-semibold">142</span>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-sm">
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container py-md rounded-lg text-headline-sm font-headline-sm flex items-center justify-center gap-sm hover:shadow-[0_0_15px_rgba(37,99,235,0.6)] transition-all duration-200">
<span class="material-symbols-outlined">replay</span>
                    Replay
                </button>
<!-- Secondary Actions Row -->
<div class="grid grid-cols-2 gap-sm mt-sm">
<button class="w-full bg-transparent border border-outline-variant text-on-surface py-md rounded-lg text-body-sm font-body-sm flex items-center justify-center gap-xs hover:bg-surface-container-highest transition-colors duration-200">
<span class="material-symbols-outlined text-[20px]">share</span>
                        Share Result
                    </button>
<button class="w-full bg-transparent border border-outline-variant text-on-surface py-md rounded-lg text-body-sm font-body-sm flex items-center justify-center gap-xs hover:bg-surface-container-highest transition-colors duration-200">
<span class="material-symbols-outlined text-[20px]">menu</span>
                        Main Menu
                    </button>
